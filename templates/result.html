<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <title>ASCII ART WEB</title>
</head>
<body>

<header>
    <h1>ASCII ART WEB</h1>
    <p>Time To Write <big>BIG</big></p>
</header>

<main>

    <section class="quick-guide-section">
        DONT KNOW WHAT TO DO?

        <details class="quick-guide">
            <summary>CLICK HERE</summary>

            <p>
                Click the input field and type something,
                select a banner and click summit, to
                generate the Ascii-Art Equivalence of your
                input text.
            </p>

            <p style="text-align: center;">
                Try It Out Right Away!!!
            </p>
        </details>
    </section>

    <form action="/switch-ascii" method="get">

        <section class="input">
            <p>Enter Text:</p>

            <textarea
                name="input"
                rows="7"
                placeholder="Type something..."
            >{{.Input}}</textarea>
        </section>

            <section class="banners-result">

                <button
                    type="submit"
                    class="btn-result"
                    name="banner"
                    value="graffiti">
                    Graffiti
                </button>

                <button
                    type="submit"
                    class="btn-result"
                    name="banner"
                    value="acrobat">
                    Acrobat
                </button>

                <button
                    type="submit"
                    class="btn-result"
                    name="banner"
                    value="shadow">
                    Shadow
                </button>

                <select
                    class="btn-result more-banners"
                    name="banner"
                    onchange="this.form.submit()">

                    <option selected disabled>
                        More ▼
                    </option>
                    <option value="standard">
                        Standard
                    </option>
                    <option value="thinkertoy">
                        Thinkertoy
                    </option>


                    <option value="graceful">
                        Graceful
                    </option>

                    <option value="merlin">
                        Merlin
                    </option>

                    <option value="miniwi">
                        Miniwi
                    </option>
                    <option value="modular">
                        Modular
                    </option>
                    <option value="ogre">
                        Ogre
                    </option>
                    <option value="rectangels">
                        Rectangles
                    </option>
                    <option value="temper">Temper</option>

                </select>

            </section>

    </form>

</main>

<div class="lower">
    <section class="output">{{.Output}}</section>

    <footer class="error">
        <pre>errors: {{.Error}}</pre>
    </footer>
</div>


</body>
</html>
